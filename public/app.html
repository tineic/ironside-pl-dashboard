.shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;min-height:100vh}

.nav-sep{height:1px;background:var(--border);margin:8px 16px}
.nav-badge{margin-left:auto;background:var(--orange);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px}
.main{padding:24px 28px;overflow-y:auto;background:var(--bg)}

function staffMonthly(s){
  if(!s.active) return 0;
  var hrsPerMonth = s.hrsPerWeek * 52 / 12;

}

function totalStaffMonthly(){
  return STAFF.reduce(function(sum,s){ return sum + staffMonthly(s); }, 0);

function getELT(i){
  // Labor never changes with revenue scenario — always use projection sheet value.
  // Only manual overrides in the labor model adjust this.
  return D.labor_row118[i];
}

function getLaborRow118(i){
  if(isActual(i)){
    var tc = D.true_cats['Labor'];
    return (tc && tc[i] !== null) ? tc[i] : 0;
  }
  var base = getELT(i);
  // Apply production hours delta override
  var ov = STATE.laborOverrides[i];
  if(ov && ov.prodHrsDelta !== null && ov.prodHrsDelta !== undefined){
    base = base + (ov.prodHrsDelta * HOURLY_RATE);
  }
  // Apply 'other' override (salary cuts etc)
  if(ov && ov.other !== null && ov.other !== undefined){
    base = base + ov.other;
  }
  return Math.max(0, base);
}

function getLaborRow119(i){
  if(isActual(i)){
    var tc = D.true_cats['Creative Contractors'];
    return (tc && tc[i] !== null) ? tc[i] : 0;
  }
  var ov = STATE.laborOverrides[i];
  // contractors override replaces the row119 total
  if(ov && ov.contractors !== null && ov.contractors !== undefined) return ov.contractors;
  return D.labor_row119[i];
}

function getLaborRow120(i){
  if(isActual(i)){
    var tc = D.true_cats['Other Labor'];
    return (tc && tc[i] !== null) ? tc[i] : 0;
  }
  return D.labor_row120[i];
}

function getLaborRow121(i){
  if(isActual(i)) return 0;
  var ov = STATE.laborOverrides[i];
  if(ov && ov.row121 !== null && ov.row121 !== undefined) return ov.row121;
  return D.labor_row121[i];
}

function getLaborBase(i){
  // Pure projection sheet values — no overrides, no adjustments
  return (D.labor_row118[i]||0) + (D.labor_row119[i]||0) + (D.labor_row120[i]||0) + (D.labor_row121[i]||0);
}

function getTotalLabor(i){
  return getLaborRow118(i) + getLaborRow119(i) + getLaborRow120(i) + getLaborRow121(i);
}

// ── PAYMENT PROCESSOR ─────────────────────────────────────────────────────────
var PP_RATE = 0.026;

function getPriorNS(i){
  // Prior month NS for PP calculation
  if(i === 0) return D.dec_2025_ns; // Jan: use Dec 2025
  if(i <= D.act_thru) return D.true_ns[i-1]||0;  // actual prior month
  if(i === D.act_thru + 1) return D.true_ns[D.act_thru]||0; // first proj month: use last actual
  return getNS(i-1); // projected prior month
}

function getPP(i){
  if(isActual(i)){
    var tc = D.true_cats['Payment Processor'];
    return (tc && tc[i] !== null) ? tc[i] : 0;
  }
  return getPriorNS(i) * PP_RATE;
}

function isPPFlagged(i){
  // Flag if actual PP > 2.6% of prior month NS
  if(!isActual(i)) return false;
  var tc = D.true_cats['Payment Processor'];
  var actual = (tc && tc[i] !== null) ? tc[i] : 0;
  var prior  = getPriorNS(i);
  return prior > 0 && actual / prior > PP_RATE;
}

function getPPItem(item, i){
  if(isActual(i)){
    var v = item.act[i];
    if(v !== null && v !== undefined) return v;
    return item.proj[i]||0;
  }
  var pool = getPP(i);
  if(item.scalable){
    var liList = D.line_items['Payment Proc.']||[];
    var fixedTotal = liList.reduce(function(s,it){
      return s + (!it.scalable ? (it.proj[i]||0) : 0);
    }, 0);
    var scalablePool = Math.max(0, pool - fixedTotal);
    var prop = (D.pp_scalable_props[item.name]||[])[i] || 0.25;
    return scalablePool * prop;
  }
  return item.proj[i]||0;
}

// ── CATEGORY TOTAL ────────────────────────────────────────────────────────────
function getCat(cat, i){
  var normCat = {'Payment Proc.':'Payment Processor','Company Exp.':'Company Expense'}[cat]||cat;
  if(isActual(i)){
    var tc = D.true_cats[normCat]||D.true_cats[cat];
    if(tc && tc[i] !== null && tc[i] !== undefined) return tc[i];
    return null;
  }
  // ── Projected months: scenario rules ──
  // Labor: never changes with scenario — always use projection sheet values
  if(normCat === 'Labor')                return getTotalLabor(i);
  if(normCat === 'Creative Contractors') return getLaborRow119(i);
  if(normCat === 'Other Labor')          return getLaborRow120(i);
  if(normCat === 'Projects/One-Time')    return getLaborRow121(i);
  // Payment Processor: 2.6% of prior month NS
  if(normCat === 'Payment Processor')    return getPP(i);
  // Marketing: 3.3% of scenario NS, preserving line item proportions
  if(normCat === 'Marketing'){
    return getNS(i) * MKT_TARGET_PCT;
  }
  // Fixed categories — unchanged regardless of scenario
  if(normCat === 'Company Expense')  return FIXED.comp_exp[i];
  if(normCat === 'Rewards')          return FIXED.rewards[i];
  if(normCat === 'Building')         return FIXED.building[i];
  if(normCat === 'Software')         return FIXED.software[i];
  if(normCat === 'Personal')         return FIXED.personal[i];
  if(normCat === 'Misc')             return FIXED.misc[i];
  // Fallback to projection sheet
  var pc = D.proj_cat[normCat]||D.proj_cat[cat];
  return (pc && pc[i] !== null) ? pc[i] : null;
}

// ── OPERATING COST & NET INCOME ───────────────────────────────────────────────
function getOC(i){
  if(isActual(i)) return D.true_oc[i]||0;
  // Sum all categories using scenario rules
  var labor = getTotalLabor(i);
  var pp    = getPP(i);
  var mkt   = getNS(i) * MKT_TARGET_PCT;
  return labor + pp + mkt +
    FIXED.comp_exp[i] + FIXED.rewards[i] + FIXED.building[i] +
    FIXED.software[i] + FIXED.personal[i] + FIXED.misc[i];
}

function getNI(i){
  if(isActual(i)) return D.true_ni[i]||0;
  return getGP(i) - getOC(i);
}

// ── FORMATTERS ────────────────────────────────────────────────────────────────
function fmt(v, compact){
  if(v===null||v===undefined||isNaN(v)) return '\u2014';
  var neg=v<0, abs=Math.abs(v), s;
  if(compact){
    if(abs>=1000000) s='$'+(abs/1000000).toFixed(2)+'M';
    else if(abs>=1000) s='$'+(abs/1000).toFixed(0)+'K';
    else s='$'+abs.toFixed(0);
  } else {
    s = '$' + Math.round(abs).toLocaleString('en-US');
  }
  return neg ? '('+s+')' : s;
}
function fmtPct(v){ return (v===null||isNaN(v)) ? '\u2014' : v.toFixed(1)+'%'; }
function getRange(){ return RANGE_MAP[document.getElementById('rangeSelect').value]||RANGE_MAP.fy; }

// ── SCENARIO TABLE ────────────────────────────────────────────────────────────
function buildScenarioTable(){
  var h = '';
  var projMonths = [3,4,5,6,7,8,9,10,11]; // Apr-Dec
  projMonths.forEach(function(mi){
    var pct = STATE.scenarioPct[mi-3];
    var ns  = fmt(getNS(mi), true);
    h += '<div class="sc-cell">'+
      '<div class="sc-mo">'+MONTHS[mi]+'</div>'+
      '<input type="number" class="sc-input'+(pct!==0?' nonzero':'')+
        '" value="'+pct+'" step="1" data-mi="'+mi+'"'+
        ' oninput="onScenarioInput(this)" onchange="onScenarioInput(this)">'+
      '<div class="sc-pct" id="scNS'+mi+'">'+ns+'</div>'+
      '</div>';
  });
  document.getElementById('scTable').innerHTML = h;
}

function onScenarioInput(el){
  var mi  = parseInt(el.dataset.mi);
  var pct = parseFloat(el.value)||0;
  STATE.scenarioPct[mi-3] = pct;
  el.className = 'sc-input' + (pct!==0?' nonzero':'');
  // Update NS preview
  document.getElementById('scNS'+mi).textContent = fmt(getNS(mi), true);
  // Update preset buttons
  var allSame = STATE.scenarioPct.every(function(p){ return p===pct; });
  document.querySelectorAll('.sc-btn').forEach(function(btn){
    btn.classList.remove('active');
  });
  if(allSame){
    var presets = [-25,-15,-10,0,10,15,20];
    presets.forEach(function(p,idx){
      if(p===pct) document.querySelectorAll('.sc-btn')[idx].classList.add('active');
    });
  }
  saveToServer(); render();
}

function fillAll(pct){
  STATE.scenarioPct = [pct,pct,pct,pct,pct,pct,pct,pct,pct];
  buildScenarioTable();
  // sync slider/input
  var sl=document.getElementById('slider'); if(sl) sl.value=Math.max(-50,Math.min(50,pct));
  var pi=document.getElementById('pctInput'); if(pi) pi.value=pct;
  updateScLbl(pct);
  document.querySelectorAll('.sc-btn').forEach(function(btn){ btn.classList.remove('active'); });
  var presets=[-25,-15,-10,0,10,15,20];
  presets.forEach(function(p,i){ if(p===pct) document.querySelectorAll('.sc-btn')[i].classList.add('active'); });
  render();
}

function onSlider(){
  var pct=parseInt(document.getElementById('slider').value)||0;
  document.getElementById('pctInput').value=pct;
  updateScLbl(pct);
  fillAll(pct);
}

function onPctInput(){
  var pct=parseFloat(document.getElementById('pctInput').value)||0;
  var sl=document.getElementById('slider'); if(sl) sl.value=Math.max(-50,Math.min(50,pct));
  updateScLbl(pct);
  fillAll(pct);
}

function nudge(d){
  var el=document.getElementById('pctInput');
  el.value=(parseFloat(el.value)||0)+d;
  onPctInput();
}

function updateScLbl(pct){
  var f=1+pct/100;
  var lbl=pct===0?'2025 Pace (1.00×)':(pct>0?'+':'')+pct+'% ('+f.toFixed(2)+'×)';
  var el=document.getElementById('scLbl'); if(el) el.textContent=lbl;
}

function toggleMonthly(){
  var wrap=document.getElementById('monthlyWrap');
  var arrow=document.getElementById('monthlyArrow');
  var btn=document.getElementById('monthlyToggle');
  var visible=wrap.style.display!=='none';
  wrap.style.display=visible?'none':'block';
  arrow.innerHTML=visible?'&#9654;':'&#9660;';
  btn.style.color=visible?'var(--muted)':'var(--blue)';
  btn.style.borderColor=visible?'var(--border)':'var(--blue)';
  if(!visible) buildScenarioTable();
}

function resetScenario(){
  fillAll(0);
}

// ── ALERTS ENGINE ────────────────────────────────────────────────────────────
function buildAlerts(){
  var alerts=[], ATH=D.act_thru;
  for(var i=0;i<=ATH;i++){
    var mo=MONTHS[i], ns=D.true_ns[i]||0, pns=D.proj_ns[i]||0;
    // PP: vs 2.6% of prior month NS
    var tc_pp=D.true_cats['Payment Processor'];
    if(tc_pp&&tc_pp[i]!==null){
      var pp_a=tc_pp[i],prior=getPriorNS(i),pp_e=prior*PP_RATE,pp_p=prior>0?pp_a/prior*100:0;
      if(pp_p>PP_RATE*100+0.15) alerts.push({mo:mo,cat:'Payment Processor',sev:'warn',
        txt:'Fees '+pp_p.toFixed(2)+'% of '+MONTHS[i>0?i-1:11]+' revenue (expected ≤2.6%). '+fmt(pp_a)+' vs expected '+fmt(pp_e)+'. Possible chargebacks — review line items.'});
    }
    // Revenue vs projection
    if(pns>0){
      var nv=(ns-pns)/pns;
      if(nv<-0.10) alerts.push({mo:mo,cat:'Net Sales',sev:'warn',
        txt:'Revenue '+fmt(ns)+' is '+(Math.abs(nv)*100).toFixed(1)+'% below projection ('+fmt(pns)+'). Scenario model may need updating.'});
      else if(nv>0.10) alerts.push({mo:mo,cat:'Net Sales',sev:'good',
        txt:'Revenue '+fmt(ns)+' is '+(nv*100).toFixed(1)+'% above projection ('+fmt(pns)+').'});
    }
    // Marketing: threshold + vs projection
    var tc_mkt=D.true_cats['Marketing'],pj_mkt=D.proj_cat['Marketing'];
    if(tc_mkt&&tc_mkt[i]!==null&&pj_mkt&&pj_mkt[i]&&ns>0){
      var mp=tc_mkt[i]/ns*100;
      if(mp>3.3) alerts.push({mo:mo,cat:'Marketing',sev:'warn',
        txt:'Marketing '+mp.toFixed(1)+'% of revenue (target ≤3.3%). Actual: '+fmt(tc_mkt[i])+'.'});
      else if(Math.abs(tc_mkt[i]-pj_mkt[i])>5000) alerts.push({mo:mo,cat:'Marketing',sev:'info',
        txt:fmt(tc_mkt[i])+' actual vs '+fmt(pj_mkt[i])+' projected (Δ'+fmt(Math.abs(tc_mkt[i]-pj_mkt[i]))+' '+(tc_mkt[i]>pj_mkt[i]?'over':'under')+').'});
    }
    // Building: over projection
    var tc_bld=D.true_cats['Building'],pj_bld=D.proj_cat['Building'];
    if(tc_bld&&tc_bld[i]!==null&&pj_bld&&pj_bld[i]&&tc_bld[i]>pj_bld[i]*1.15)
      alerts.push({mo:mo,cat:'Building',sev:'info',
        txt:fmt(tc_bld[i])+' actual vs '+fmt(pj_bld[i])+' projected (+'+(((tc_bld[i]/pj_bld[i])-1)*100).toFixed(0)+'%).'});
    // Rewards unusually large
    var tc_rwd=D.true_cats['Rewards'];
    if(tc_rwd&&tc_rwd[i]!==null&&tc_rwd[i]<-15000)
      alerts.push({mo:mo,cat:'Rewards',sev:'good',
        txt:'Strong rewards/credits: '+fmt(tc_rwd[i])+'. Confirm correctly applied.'});
  }
  // Filter out dismissed alerts
  alerts = alerts.filter(function(a){ return !STATE.dismissedAlerts[alertKey(a)]; });
  // Update topbar + sidebar badge
  var el=document.getElementById('alertCount'); if(el) el.textContent=alerts.length;
  var nb=document.getElementById('navAlertBadge');
  if(nb){ nb.textContent=alerts.length; nb.style.display=alerts.length>0?'inline-block':'none'; }
  return alerts;
}

function renderAlerts(){
  var alerts=buildAlerts(), ATH=D.act_thru;
  var SEV={
    over:{bg:'var(--red-l)',   bd:'var(--red-b)',   tc:'var(--red)',   icon:'⚠'},
    warn:{bg:'var(--orange-l)',bd:'var(--orange-b)',tc:'var(--orange)', icon:'⚠'},
    info:{bg:'var(--blue-l)',  bd:'var(--blue-b)',  tc:'var(--blue)',  icon:'ℹ'},
    good:{bg:'var(--green-l)', bd:'var(--green-b)', tc:'var(--green)', icon:'✓'},
  };
  var h='<div id="alertsPanel" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:18px">';
  h+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">';
  h+='<span>Action Items — Jan–'+MONTHS[ATH]+' Actuals</span>';
  h+='<span style="font-size:10px;color:var(--m2)">'+alerts.length+' item'+(alerts.length!==1?'s':'')+'</span></div>';
  if(alerts.length===0){
    h+='<div style="font-size:12px;color:var(--green);font-weight:600">✓ No issues flagged. Everything looks in line.</div>';
    return h+'</div>';
  }
  // Group by category
  var groups={}, catOrder=['Payment Processor','Net Sales','Marketing','Building','Rewards'];
  alerts.forEach(function(a){ if(!groups[a.cat]) groups[a.cat]=[]; groups[a.cat].push(a); });
  Object.keys(groups).forEach(function(c){ if(catOrder.indexOf(c)<0) catOrder.push(c); });
  catOrder.forEach(function(cat){
    var items=groups[cat]; if(!items||!items.length) return;
    var color=CAT_COLORS[cat]||'var(--muted)';
    h+='<div style="margin-bottom:12px">';
    h+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">';
    h+='<div style="width:8px;height:8px;border-radius:2px;background:'+color+';flex-shrink:0"></div>';
    h+='<span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t2)">'+cat+'</span></div>';
    items.forEach(function(a){
      var cfg=SEV[a.sev]||SEV.info;
      h+='<div style="display:flex;gap:8px;align-items:flex-start;padding:7px 11px;background:'+cfg.bg+';border:1px solid '+cfg.bd+';border-radius:7px;margin-bottom:4px">';
      h+='<span style="font-size:11px;flex-shrink:0;margin-top:1px;color:'+cfg.tc+'">'+cfg.icon+'</span>';
      h+='<div><span style="font-size:10px;font-weight:700;color:'+cfg.tc+'">'+a.mo+'</span>';
      h+='<span style="font-size:12px;color:var(--t2);margin-left:6px">'+a.txt+'</span></div></div>';
    });
    h+='</div>';
  });
  return h+'</div>';
}

// ── LABOR PANEL ───────────────────────────────────────────────────────────────
function renderLaborPanel(){
  var h = '<div class="labor-panel">'+
    '<div class="labor-title"><span>Labor Model — Apr\u2013Oct (all 4 rows vs 17.6% target)</span>'+
    '<span style="font-size:10px;color:var(--muted);font-weight:400">Builder: 1.5 hrs/PC &middot; Total labor: ~3.5 hrs/PC &middot; Budget proxy: 4 hrs &times; rate &middot; 17.6% threshold</span></div>'+
    '<div class="labor-grid">';

  for(var i=3; i<=11; i++){  // Apr-Oct only
    var ns    = getNS(i);
    var row118= getLaborRow118(i);
    var row119= getLaborRow119(i);
    var row120= getLaborRow120(i);
    var row121= getLaborRow121(i);
    var total = row118+row119+row120+row121;
    var pct   = ns>0 ? total/ns*100 : 0;
    var f     = getFactor(i);
    var baseUnits = D.units_2025[i];
    var scenUnits = Math.round(baseUnits * f);
    var prodLabor = scenUnits * HOURS_PER_BUILD * HOURLY_RATE;
    var salFloor  = D.salaried_floor[i];

    var status = pct <= 17.6 ? 'ok' : (pct <= 19 ? 'warn' : 'over');
    var pctCls = status;

    var ov = STATE.laborOverrides[i]||{};

    h += '<div class="labor-mo-card '+status+'" id="lmc'+i+'">'+
      '<div class="lm-mo">'+MONTHS[i]+'</div>'+
      '<div class="lm-pct '+pctCls+'">'+pct.toFixed(1)+'%</div>'+
      '<div class="lm-detail">'+
        scenUnits+' units &middot; '+fmt(total,true)+' total<br>'+
        'Sal: '+fmt(row118,true)+' / Ctrs: '+fmt(row119+row120,true)+
        (row121>0?' / Proj: '+fmt(row121,true):'')+
      '</div>';

    if(pct > 17.6){
      // Calculate what needs to be cut
      var target  = ns * LABOR_THRESHOLD;
      var overage = total - target;
      var ctrTotal = row119 + row120;
      var ctrCut  = Math.min(ctrTotal, overage);
      var remainOver = overage - ctrCut;
      var hrCut   = remainOver > 0 ? Math.ceil(remainOver / HOURLY_RATE) : 0;

      h += '<div class="lm-action">&#9888; Over by '+fmt(overage,true)+'<br>';
      if(ctrCut>0) h += 'Cut ctrs: '+fmt(ctrCut,true)+'<br>';
      if(hrCut>0)  h += 'Cut '+hrCut+' prod hrs<br>';
      h += '</div>';

      h += '<div class="lm-override">'+
        '<label>Override Row 118 (Labor)</label>'+
        '<div class="lm-override-row">'+
          '<input type="number" placeholder="'+Math.round(row118)+'" value="'+(ov.row118!==undefined&&ov.row118!==null?Math.round(ov.row118):'')+'" '+
            'onchange="setLaborOverride('+i+',\'row118\',this.value)">'+
        '</div>'+
        '<label style="margin-top:3px">Override Contractors</label>'+
        '<div class="lm-override-row">'+
          '<input type="number" placeholder="'+Math.round(row119)+'" value="'+(ov.row119!==undefined&&ov.row119!==null?Math.round(ov.row119):'')+'" '+
            'onchange="setLaborOverride('+i+',\'row119\',this.value)">'+
          '<button class="lm-override-apply" onclick="applyLaborOverride('+i+')">Apply</button>'+
        '</div>'+
      '</div>';
    }

    h += '</div>';
  }

  h += '</div></div>';
  return h;
}

function applyRosterToScenario(){
  var baselineMonthly = CURRENT_MONTHLY;
  var scenarioMonthly = totalStaffMonthly();
  var delta = scenarioMonthly - baselineMonthly;
  var inactive = STAFF.filter(function(s){return !s.active;}).map(function(s){return s.name;});
  var note = delta < 0
    ? 'Roster adj: -$'+Math.round(Math.abs(delta)).toLocaleString()+'/mo'+(inactive.length?' (excl. '+inactive.join(', ')+')':'')
    : delta > 0 ? 'Roster adj: +$'+Math.round(delta).toLocaleString()+'/mo'
    : 'No change from baseline';

  // Only apply to checked months
  var applied = 0;
  for(var i=3; i<=11; i++){
    var cb = document.getElementById('applyMo'+i);
    if(cb && cb.checked){
      if(!STATE.laborOverrides[i]) STATE.laborOverrides[i] = {};
      STATE.laborOverrides[i].other = delta;
      STATE.laborOverrides[i].otherNote = note;
      applied++;
    }
  }

  var btn = document.getElementById('applyRosterBtn');
  if(btn){
    var orig = btn.textContent;
    btn.textContent = applied > 0 ? '✓ Applied to '+applied+' month'+(applied!==1?'s':'') : '⚠ No months selected';
    btn.style.background = applied > 0 ? 'var(--green)' : 'var(--orange)';
    setTimeout(function(){ btn.textContent = orig; btn.style.background = 'var(--blue)'; }, 2000);
  }
  render();
}

function selectAllApplyMonths(val){
  for(var i=3; i<=11; i++){
    var cb = document.getElementById('applyMo'+i);
    if(cb) cb.checked = val;
  }
}

function resetLaborOverrides(){
  STATE.laborOverrides = {};
  saveToServer(); render();
}



function applyLaborOverride(mi){
  if(!STATE.laborOverrides[mi]) STATE.laborOverrides[mi] = {};
  var ov = STATE.laborOverrides[mi];
  // Read production hours delta
  var prodEl = document.getElementById('ovProd'+mi);
  if(prodEl){ var v=parseFloat(prodEl.value); ov.prodHrsDelta = isNaN(v)?null:v; }
  // Read contractors budget
  var ctrEl = document.getElementById('ovCtr'+mi);
  if(ctrEl){ var v2=parseFloat(ctrEl.value); ov.contractors = isNaN(v2)?null:v2; }
  // Read other
  var otherEl = document.getElementById('ovOther'+mi);
  if(otherEl){ var v3=parseFloat(otherEl.value); ov.other = isNaN(v3)?null:v3; }
  var noteEl = document.getElementById('ovOtherNote'+mi);
  if(noteEl) ov.otherNote = noteEl.value||'';
  render();
}

function pinLaborOverride(mi){
  // First apply the current inputs
  applyLaborOverride(mi);
  var ov = STATE.laborOverrides[mi]||{};
  var parts = [];
  if(ov.prodHrsDelta) parts.push('Production hrs: '+(ov.prodHrsDelta>0?'+':'')+ov.prodHrsDelta+' ('+fmt(Math.abs(ov.prodHrsDelta*HOURLY_RATE),true)+' '+(ov.prodHrsDelta>0?'added':'saved')+')');
  if(ov.contractors!=null) parts.push('Contractors budget: '+fmt(ov.contractors,true));
  if(ov.other!=null) parts.push('Other adj: '+(ov.other>0?'+':'')+fmt(ov.other,true)+(ov.otherNote?' — '+ov.otherNote:''));
  if(!parts.length) parts.push('Labor adjustments applied (no details entered)');
  var labPin = {
    id: Date.now(),

    mo: MONTHS[mi], cat: 'Labor', sev: 'info',

  };

}

// ── LOCALSTORAGE ──────────────────────────────────────────────────────────────
// Detect best available storage: localStorage > sessionStorage > in-memory
var _storage = (function(){
  var stores = [
    {name:'localStorage', s:window.localStorage},
    {name:'sessionStorage', s:window.sessionStorage}
  ];
  for(var i=0;i<stores.length;i++){
    try{
      stores[i].s.setItem('_t','1');
      stores[i].s.removeItem('_t');
      return {store:stores[i].s, name:stores[i].name};
    }catch(e){}
  }
  // In-memory fallback — survives re-renders but not tab close
  var mem = {};
  return {store:{getItem:function(k){return mem[k]||null;},setItem:function(k,v){mem[k]=v;},removeItem:function(k){delete mem[k];}}, name:'memory'};
})();

function setSyncStatus(msg){
  var el = document.getElementById('syncStatus');
  if(el) el.textContent = msg;
}

function _mergeRows(rows){
  if(!Array.isArray(rows)) return;
  var localIds = STATE.customItems.map(function(it){ return String(it.id); });
  rows.forEach(function(row){
    if(!row.id || !row.note) return;
    var rowId = String(row.id);
    if(localIds.indexOf(rowId) < 0){
      STATE.customItems.push({
        id: rowId, timestamp: row.timestamp||'',
        mo: row.month||'General', cat: row.category||'Custom',
        txt: row.note||'', addedBy: row.added_by||'',
        sev:'info', custom:true
      });
      localIds.push(rowId);
    }
    if(row.dismissed==='true'||row.dismissed===true)
      STATE.dismissedAlerts['pin:'+rowId] = true;
  });
  savePinsLocally();
}

async function syncFromSheet(){
  setSyncStatus('Syncing…');
  try{
    var resp = await fetch(SHEET_URL, {method:'GET', mode:'cors'});
    var rows = await resp.json();
    _mergeRows(rows);
    setSyncStatus('✓ Synced');
    render();
  }catch(e){
    // CORS blocked (file:// protocol) — try no-cors read via image trick won't work
    // Fall back silently, local storage still works
    setSyncStatus('Local only — host file over HTTP to enable sync');
  }
}

async function bulkSendToClickUp(){
  var checked = Array.from(document.querySelectorAll('[id^="ck_"]:checked')).map(function(cb){ return cb.id.replace('ck_',''); });
  if(!checked.length){ window.alert('No items selected.'); return; }

  var autoAlerts = _origBuildAlerts();
  var sent = 0, failed = 0;

  for(var i=0; i<checked.length; i++){
    var ckid = checked[i];
    var taskName, desc;

    if(ckid.startsWith('pin_')){
      // Custom pin
      var pinId = parseInt(ckid.replace('pin_',''));
      var pin = STATE.customItems.find(function(p){ return p.id===pinId; });
      if(!pin) continue;
      var text = pin.txt || pin.note || '';
      var month = pin.mo_label || pin.mo || '';
      taskName = '[' + (pin.cat||'Action') + '] ' + (month?month+' - ':'') + text;
      desc = 'P&L Dashboard action item.\nMonth: '+month+'\nCategory: '+(pin.cat||'')+'\nNote: '+text+'\nAdded by: '+(pin.addedBy||'');
      try{
        var r = await fetch('/api/clickup/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:taskName,description:desc,priority:3})});
        var d = await r.json();
        if(d.ok){ pin.clickupUrl=d.taskUrl; pin.clickupId=d.taskId; STATE.clickupSent['pin_'+pinId]=d.taskUrl; sent++; }
        else { failed++; }
      } catch(e){ failed++; }
    } else {
      // Auto alert — decode from ckid
      var keyPart = ckid.replace('auto_','').replace(/_/g,'|');
      var alert = autoAlerts.find(function(a){ return alertKey(a).replace(/[|\s]/g,'_') === ckid.replace('auto_',''); });
      if(!alert){
        // fallback: use cat from ckid
        taskName = '[Alert] ' + ckid.replace('auto_','').replace(/_/g,' ');
        desc = 'Auto-detected alert from P&L Dashboard.';
      } else {
        taskName = '[' + (alert.cat||'Alert') + '] ' + alert.mo + ' - ' + alert.txt.substring(0,60);
        desc = 'Auto-detected alert from P&L Dashboard.\nMonth: '+alert.mo+'\nCategory: '+(alert.cat||'')+'\nDetail: '+alert.txt;
      }
      try{
        var r2 = await fetch('/api/clickup/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:taskName,description:desc,priority:2})});
        var d2 = await r2.json();
        if(d2.ok){ STATE.clickupSent[ckid]=d2.taskUrl; sent++; } else { failed++; }
      } catch(e){ failed++; }
    }
  }

  savePinsLocally();
  saveToServer();
  window.alert(sent+' item'+(sent!==1?'s':'')+' sent to ClickUp.'+(failed?' '+failed+' failed.':''));
  render();
}

// Capacity per person per day (from actual floor data)
var CAPACITY = {
  builder:   5.5,   // avg 5-6 PCs/day
  detailer:  10,    // PCs detailed/day (60% of orders)
  inventory: 40,    // PCs worth of parts pulled/day
  testing:   45,    // PCs tested/day
  shipping:  25,    // PCs shipped/day
  cs:        12     // PCs worth of CS volume/day
};

function calcStaffing(units, detPct){
  return {
    builders:   Math.ceil(units / CAPACITY.builder),
    detailers:  Math.ceil(units * detPct / CAPACITY.detailer),
    inventory:  Math.ceil(units / CAPACITY.inventory),
    testing:    Math.ceil(units / CAPACITY.testing),
    shipping:   Math.ceil(units / CAPACITY.shipping),
    cs:         Math.ceil(units / CAPACITY.cs),
  };
}

var HRS_FULL_MO = 38 * 52 / 12;

// Get laid-off names for a specific month
function getLaidOffNames(monthIdx){
  return (STATE.staffingChanges||[]).filter(function(c){
    return c.type==='layoff' && c.status!=='removed' && monthIdx >= c.startMonth;
  }).map(function(c){ return c.personName; });
}

// Get hour reductions for a specific month -> {personName: newHrs}
function getHourReductions(monthIdx){
  var reductions = {};
  (STATE.staffingChanges||[]).forEach(function(c){
    if(c.type==='hours' && c.status!=='removed' && monthIdx>=c.startMonth && monthIdx<=c.endMonth){
      reductions[c.personName] = c.newHrs;
    }
  });
  return reductions;
}

// Calculate adjusted roster cost for a month (floor month 3+ scenario)
function getAdjustedRosterCost(monthIdx){
  var laidOff = getLaidOffNames(monthIdx);
  var reductions = getHourReductions(monthIdx);
  return STAFF.reduce(function(sum, p){
    if(laidOff.indexOf(p.name) >= 0) return sum;
    var currentHrs = reductions[p.name] !== undefined ? reductions[p.name] : (p.hrsPerWeek||p.hrs||38);
    // Apply live slider preview for Apr (first projection month)
    if(monthIdx === firstProjMonth() && STATE.rosterSliders && STATE.rosterSliders[p.id] !== undefined){
      currentHrs = STATE.rosterSliders[p.id];
    }
    return sum + (p.base * STAFF_MULTIPLIER) * (currentHrs * 52/12);
  }, 0);
}

// Calculate minimum required cost for a month based on volume + layoffs
// First projection month — updates automatically when actuals are loaded
function firstProjMonth(){ return D.act_thru + 1; }

var DAYS_PER_WEEK   = 4;
var WEEKS_PER_MONTH = 52/12;
var MIKE_CAPACITY_WK    = 15;
var BUILDER_CAPACITY_WK = 20;
var CAPACITY_LAB = {
  Building:  5,     // per builder per day (4-day week)
  Detailing: 12.5,  // Juan ~50 units/wk real ÷ 4 days
  Inventory: 30,    // Riley ~120/wk ÷ 4 days
  Testing:   40,    // Shawn up to 40/day; Brett ≤5/day + RMA
  Shipping:  25,    // Sterling ~100/wk ÷ 4 days
  CS:        12     // coverage-based, not volume-driven
};
var NS_PER_UNIT  = 2886;   // $/unit — 2026 Q1 avg ($2,193,045 / 760 units)

function getMinRequired(dailyUnits, detPct, laidOffNames){
  var total = 0;
  var weeklyUnits = dailyUnits * DAYS_PER_WEEK;

  // ── BUILDING: stepped by weekly demand ───────────────────────────────────
  var buildBench = [
    {name:'Mike',    base:24.00, cap:MIKE_CAPACITY_WK,    hrs:HRS_FULL_MO},
    {name:'Janelle', base:21.00, cap:BUILDER_CAPACITY_WK, hrs:HRS_FULL_MO},
    {name:'Eli',     base:19.50, cap:BUILDER_CAPACITY_WK, hrs:HRS_FULL_MO},
    {name:'Matt',    base:18.00, cap:BUILDER_CAPACITY_WK, hrs:HRS_FULL_MO},
  ];
  var remaining = weeklyUnits;
  buildBench.forEach(function(p){
    if(remaining > 0 || p.name === 'Mike'){
      var rate = laidOffNames.indexOf(p.name) >= 0 ? GENERIC_RATE_BASE : p.base;
      total += rate * STAFF_MULTIPLIER * p.hrs;
      remaining -= p.cap;
    }
  });
  while(remaining > 0){
    total += GENERIC_RATE_BASE * STAFF_MULTIPLIER * HRS_FULL_MO;
    remaining -= BUILDER_CAPACITY_WK;
  }

  // ── TESTING: Brett always full salary; Shawn added if >5/day ─────────────
  var BRETT_TEST_CAP_WK = 5 * DAYS_PER_WEEK;  // Brett tests max 5/day alongside RMA
  var SHAWN_TEST_CAP_WK = 40 * DAYS_PER_WEEK; // Shawn handles up to 40/day testing
  var brettRate = laidOffNames.indexOf('Brett') >= 0 ? GENERIC_RATE_BASE : 29.93;
  total += brettRate * STAFF_MULTIPLIER * (40 * 52/12); // Brett always full salary
  if(weeklyUnits > BRETT_TEST_CAP_WK){
    var shawnRate = laidOffNames.indexOf('Shawn') >= 0 ? GENERIC_RATE_BASE : 22.00;
    total += shawnRate * STAFF_MULTIPLIER * HRS_FULL_MO;
  }
  if(weeklyUnits > BRETT_TEST_CAP_WK + SHAWN_TEST_CAP_WK){
    total += GENERIC_RATE_BASE * STAFF_MULTIPLIER * HRS_FULL_MO; // generic tester
  }

  // ── OTHER DEPTS: scale floor hours with volume ────────────────────────────
  var deptDefs = [
    {name:'Detailing', floorPeople:[{name:'Juan',base:23.00,floorHrs:35}],   extra:[{name:'Brandon',base:20.70}], capPerDay:12.5, demandFn:function(w){ return w*detPct; }},
    {name:'CS',        floorPeople:[{name:'Spencer',base:25.00,floorHrs:35},{name:'Danni',base:20.00,floorHrs:20}], extra:[], capPerDay:12, demandFn:function(w){ return w; }},
    {name:'Shipping',  floorPeople:[{name:'Sterling',base:22.00,floorHrs:35}], extra:[], capPerDay:25, demandFn:function(w){ return w; }},
    {name:'Inventory', floorPeople:[{name:'Riley',base:25.00,floorHrs:35}],   extra:[], capPerDay:30, demandFn:function(w){ return w; }},
  ];

  deptDefs.forEach(function(dept){
    var weeklyDemand = dept.demandFn(weeklyUnits);
    var capPerHr     = dept.capPerDay / 8;
    var capPerWkAt38 = 38 * DAYS_PER_WEEK * capPerHr;
    var deptCap = 0;

    dept.floorPeople.forEach(function(p){
      var rate = laidOffNames.indexOf(p.name) >= 0 ? GENERIC_RATE_BASE : p.base;
      if(p.salaried){
        total += rate * STAFF_MULTIPLIER * (p.floorHrs * 52/12);
        deptCap += p.floorHrs * DAYS_PER_WEEK * capPerHr;
      } else {
        var myDemand = Math.max(0, weeklyDemand - deptCap);
        var myNeededHrs = myDemand > 0
          ? Math.max(p.floorHrs, Math.min(38, Math.ceil(myDemand / (capPerHr * DAYS_PER_WEEK))))
          : p.floorHrs;
        total += rate * STAFF_MULTIPLIER * (myNeededHrs * 52/12);
        deptCap += myNeededHrs * DAYS_PER_WEEK * capPerHr;
      }
    });

    dept.extra.forEach(function(p){
      if(deptCap < weeklyDemand){
        var rate = laidOffNames.indexOf(p.name) >= 0 ? GENERIC_RATE_BASE : p.base;
        total += rate * STAFF_MULTIPLIER * HRS_FULL_MO;
        deptCap += capPerWkAt38;
      }
    });
    while(deptCap < weeklyDemand){
      total += GENERIC_RATE_BASE * STAFF_MULTIPLIER * HRS_FULL_MO;
      deptCap += capPerWkAt38;
    }
  });

  return total;
}

function getWeeklyUnits(monthIdx){
  var ns = getNS(monthIdx);
  if(!ns || ns <= 0) return 20;
  return Math.max(4, Math.round((ns / NS_PER_UNIT) / WEEKS_PER_MONTH));
}
function getDailyUnits(monthIdx){
  return Math.round(getWeeklyUnits(monthIdx) / DAYS_PER_WEEK);
}
function getAvgDailyUnits(){
  var total = 0;
  for(var i=3;i<12;i++) total += getDailyUnits(i);
  return Math.round(total / 9);
}
function getAvgWeeklyUnits(){
  var total = 0;
  for(var i=3;i<12;i++) total += getWeeklyUnits(i);
  return Math.round(total / 9);
}

// Floor crew names
var FLOOR_CREW = ['Spencer','Danni','Riley','Juan','Mike','Sterling','Brett'];
var FLOOR_HRS  = 30;

var FLOOR_HRS_MAP = {
  Spencer:35, Danni:20, Brett:40, Sterling:35,
  Riley:35, Juan:35, Mike:38
};

function getFloorMonthlyCost(){
  return STAFF.reduce(function(sum,p){
    if(FLOOR_CREW.indexOf(p.name)<0) return sum;
    var wkHrs = FLOOR_HRS_MAP[p.name] || 35;
    return sum + (p.base * STAFF_MULTIPLIER) * (wkHrs * 52/12);
  }, 0);
}

function getRosterMonthlyCost(){
  return STAFF.reduce(function(sum,p){
    if(p.active===false) return sum;
    var hrs = (p.hrsPerWeek||p.hrs||38) * 52/12;
    return sum + (p.base * STAFF_MULTIPLIER) * hrs;
  }, 0);
}

function formSelect(id, label, options){
  var h = '<div style="display:flex;flex-direction:column;gap:4px">';

  options.forEach(function(o){ h += '<option value="'+o.val+'"'+(o.sel?' selected':'')+'>'+o.lbl+'</option>'; });
  h += '</select></div>';
  return h;
}

function toggleAddForm(id){
  var el = document.getElementById(id);
  if(el) el.style.display = el.style.display==='none'?'block':'none';
}

function onRosterSlider(personId, val){
  val = parseInt(val, 10);
  if(!STATE.rosterSliders) STATE.rosterSliders = {};
  var p = STAFF.find(function(s){ return s.id===personId; });
  if(!p) return;
  var defaultHrs = parseInt(p.hrsPerWeek||p.hrs||38, 10);
  var loaded = p.base * STAFF_MULTIPLIER;
  var defaultMonthly = loaded * (defaultHrs * 52/12);
  var previewMonthly = loaded * (val * 52/12);
  var savings = defaultMonthly - previewMonthly;

  // Store in state (for tile calculations)
  if(val === defaultHrs){
    delete STATE.rosterSliders[personId];
  } else {
    STATE.rosterSliders[personId] = val;
  }

  // Update label inline — no re-render
  var lbl = document.getElementById('sliderLbl_'+personId);
  if(lbl) lbl.textContent = val+' h/wk';

  var costLbl = document.getElementById('monthlyCost_'+personId);
  if(costLbl) costLbl.textContent = fmt(previewMonthly)+'/mo';

  // Update savings label inline
  var savLbl = document.getElementById('savingsLbl_'+personId);
  if(savLbl){
    if(val !== defaultHrs){
      savLbl.textContent = '-'+fmt(savings)+'/mo';
      savLbl.style.display = '';
    } else {
      savLbl.style.display = 'none';
    }
  }

  // Show/hide apply row inline
  var applyRow = document.getElementById('applyRow_'+personId);
  if(applyRow){
    applyRow.style.display = (val !== defaultHrs) ? 'flex' : 'none';
  }

  // Update summary tiles (Adjusted Cost tile) without re-rendering roster
  var tilesEl = document.getElementById('laborTiles');
  if(tilesEl) tilesEl.innerHTML = renderLaborTiles();
}

function applyRosterSlider(personId){
  var p = STAFF.find(function(s){ return s.id===personId; });
  if(!p) return;
  var newHrs = STATE.rosterSliders && STATE.rosterSliders[personId] !== undefined
    ? STATE.rosterSliders[personId]
    : (p.hrsPerWeek||p.hrs||38);
  var startMonth = parseInt(document.getElementById('hrFrom_'+personId).value);
  var endMonth   = parseInt(document.getElementById('hrTo_'+personId).value);
  var currentHrsMo = (p.hrsPerWeek||p.hrs||38) * 52/12;
  var newHrsMo     = newHrs * 52/12;
  var delta = -(p.base * STAFF_MULTIPLIER * (currentHrsMo - newHrsMo));
  if(!STATE.staffingChanges) STATE.staffingChanges = [];
  STATE.staffingChanges.push({
    type:'hours', personId:personId, personName:p.name,
    startMonth:startMonth, endMonth:endMonth, newHrs:newHrs,
    monthlyDelta:delta, status:'draft', id:Date.now()
  });
  // Clear the slider preview
  if(STATE.rosterSliders) delete STATE.rosterSliders[personId];
  saveToServer();
  render();
}

function resetRosterSlider(personId){
  if(STATE.rosterSliders) delete STATE.rosterSliders[personId];
  var el = document.getElementById('content');
  if(el && STATE.tab==='labor') el.innerHTML = renderLaborPage();
}

function addLayoff(){
  var personId   = document.getElementById('lyPerson').value;
  var startMonth = parseInt(document.getElementById('lyStart').value);
  var person     = STAFF.find(function(p){ return p.id===personId; });
  if(!person){ console.error('addLayoff: person not found for id='+personId); return; }
  var hrs = (person.hrsPerWeek||person.hrs||38) * 52/12;
  var delta = -(person.base * STAFF_MULTIPLIER * hrs);
  if(!STATE.staffingChanges) STATE.staffingChanges=[];
  STATE.staffingChanges.push({type:'layoff',personId:personId,personName:person.name,startMonth:startMonth,endMonth:11,monthlyDelta:delta,status:'draft',id:Date.now()});
  toggleAddForm('addLayoffForm');
  saveToServer(); render();
}

function addHourReduction(){
  var personId   = document.getElementById('hrPerson').value;
  var startMonth = parseInt(document.getElementById('hrStart').value);
  var endMonth   = parseInt(document.getElementById('hrEnd').value);
  var newHrs     = parseInt(document.getElementById('hrHours').value||0);
  var person     = STAFF.find(function(p){ return p.id===personId; });
  if(!person) return;
  var currentHrsMo = (person.hrsPerWeek||person.hrs||38)*52/12;
  var newHrsMo     = newHrs*52/12;
  var delta = -(person.base * STAFF_MULTIPLIER * (currentHrsMo - newHrsMo));
  if(!STATE.staffingChanges) STATE.staffingChanges=[];
  STATE.staffingChanges.push({type:'hours',personId:personId,personName:person.name,startMonth:startMonth,endMonth:endMonth,newHrs:newHrs,monthlyDelta:delta,status:'draft',id:Date.now()});
  toggleAddForm('addHoursForm');
  saveToServer(); render();
}

function removeChange(idx){
  if(!STATE.staffingChanges||!STATE.staffingChanges[idx]) return;
  STATE.staffingChanges[idx].status='removed';
  saveToServer(); render();
}

async function sendLaborChangeToClickUp(idx){
  var ch = (STATE.staffingChanges||[])[idx];
  if(!ch) return;
  var name = ch.type==='layoff'
    ? '[Labor] Lay off '+ch.personName+' from '+MONTHS[ch.startMonth]+' — saves '+fmt(Math.abs(ch.monthlyDelta))+'/mo'
    : '[Labor] Reduce '+ch.personName+' to '+ch.newHrs+' hrs/wk ('+MONTHS[ch.startMonth]+'\u2013'+MONTHS[ch.endMonth]+') — saves '+fmt(Math.abs(ch.monthlyDelta))+'/mo';
  var desc = 'Staffing change from P&L Dashboard.\nPerson: '+ch.personName+'\nType: '+ch.type+'\nEffective: '+MONTHS[ch.startMonth]+(ch.type==='hours'?'\u2013'+MONTHS[ch.endMonth]:' onwards')+'\nMonthly savings: '+fmt(Math.abs(ch.monthlyDelta));
  try{
    var r = await fetch('/api/clickup/task',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:name,description:desc,priority:2})});
    var d = await r.json();
    if(d.ok){ ch.clickupUrl=d.taskUrl; ch.status='sent'; saveToServer(); render(); }
    else { window.alert('ClickUp error: '+d.error); }
  }catch(e){ window.alert('Failed: '+e.message); }
}

    var active = STATE.scenarioPct && STATE.scenarioPct.every(function(v){return v===p[0];});
    var isNeg = p[0]<0;
    h += '<button onclick="setAllScenario('+p[0]+')" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid '+(active?(isNeg?'var(--red-b)':'var(--blue-b)'):'var(--b2)')+';background:'+(active?(isNeg?'var(--red-l)':'var(--blue-l)'):'var(--surface)')+';color:'+(active?(isNeg?'var(--red)':'var(--blue)'):'var(--muted)')+'">'+p[1]+'</button>';
  });
  if(any) h += '<button onclick="setAllScenario(0)" style="padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--b2);background:var(--surface);color:var(--muted)">&#8635; Reset</button>';
  h += '</div>';
  return h;
}

// ── CSV UPLOAD ────────────────────────────────────────────────────────────────
function parseCSV(text){
  var SMRY=['Net Sales','Cost of Goods','Gross Profit','Operating Cost','Net Income'];
  var CATS=['Labor','Company Expense','Rewards','Payment Processor','Building','Marketing',
    'Software','Personal','Misc','Creative Contractors','Other Labor','Projects/One-Time'];
  function pn(v){
    if(!v||!v.trim()) return null;
    var s=v.trim().replace(/,/g,''); var neg=s.startsWith('(')&&s.endsWith(')');
    s=s.replace(/[()]/g,''); var n=parseFloat(s); return isNaN(n)?null:(neg?-n:n);
  }
  var items=[],summaries={},cats={};
  text.split('\n').forEach(function(line){
    var row=line.split(','); if(row.length<6) return;
    var name=(row[4]||'').trim().replace(/^"|"$/g,'');
    var cat=(row[3]||'').trim().replace(/^"|"$/g,'');
    if(!name||name==='Bill'||name==='nan') return;
    var months=[]; for(var c=5;c<=16;c++) months.push(pn(row[c]));
    var entry={name:name,cat:cat,months:months,total:pn(row[17])};
    if(SMRY.indexOf(name)>=0) summaries[name]=entry;
    else if(CATS.indexOf(name)>=0) cats[name]=entry;
    else items.push(entry);
  });
  return{items:items,summaries:summaries,cats:cats};
}

function uploadActuals(event){
  var file=event.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var p=parseCSV(e.target.result);
      var ns=p.summaries['Net Sales'];
      D.act_thru=-1;
      if(ns) ns.months.forEach(function(v,i){if(v&&v>0) D.act_thru=i;});
      D.true_ns=[]; D.true_cogs=[]; D.true_gp=[]; D.true_oc=[]; D.true_ni=[];
      for(var i=0;i<12;i++){
        var isA=i<=D.act_thru;
        D.true_ns[i]  =isA?(p.summaries['Net Sales']&&p.summaries['Net Sales'].months[i]||null):null;
        D.true_cogs[i]=isA?(p.summaries['Cost of Goods']&&p.summaries['Cost of Goods'].months[i]||null):null;
        D.true_gp[i]  =isA?(p.summaries['Gross Profit']&&p.summaries['Gross Profit'].months[i]||null):null;
        D.true_oc[i]  =isA?(p.summaries['Operating Cost']&&p.summaries['Operating Cost'].months[i]||null):null;
        D.true_ni[i]  =isA?(p.summaries['Net Income']&&p.summaries['Net Income'].months[i]||null):null;
      }
      D.true_cats={};
      Object.keys(p.cats).forEach(function(k){
        D.true_cats[k]=p.cats[k].months.map(function(v,i){return i<=D.act_thru?v:null;});
      });
      var lbl=D.act_thru>=0?'Jan\u2013'+MONTHS[D.act_thru]:'none';
      document.getElementById('dsA').textContent='Actuals: '+lbl+' ('+file.name+')';
      document.getElementById('dsA').className='ds ds-u';
      render();
      // Also send to server for persistence across sessions
      var fd=new FormData(); fd.append('file', file);
      fetch('/api/upload/actuals',{method:'POST',body:fd}).then(function(r){return r.json();}).then(function(d){
        if(d.pdata) Object.keys(d.pdata).forEach(function(k){ PDATA[k]=d.pdata[k]; });
      }).catch(function(){});
    }catch(err){alert('Error parsing actuals: '+err.message);}
    event.target.value='';
  };
  reader.readAsText(file);
}

function uploadProjection(event){
  var file=event.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var p=parseCSV(e.target.result);
      var ns=p.summaries['Net Sales'],cogs=p.summaries['Cost of Goods'];
      if(ns) D.proj_ns=ns.months;
      if(cogs) D.proj_cogs=cogs.months;
      if(p.summaries['Gross Profit']) D.proj_gp=p.summaries['Gross Profit'].months;
      if(p.summaries['Operating Cost']) D.proj_oc=p.summaries['Operating Cost'].months;
      if(p.summaries['Net Income']) D.proj_ni=p.summaries['Net Income'].months;
      if(ns&&cogs) D.cogs_pct=cogs.months.map(function(c,i){var n=ns.months[i]||0;return n>0?c/n:0.70;});
      D.proj_cat={}; Object.keys(p.cats).forEach(function(k){D.proj_cat[k]=p.cats[k].months;});
      var actByName={};
      Object.values(D.line_items).forEach(function(arr){arr.forEach(function(it){actByName[it.name]=it.act;});});
      D.line_items={};
      p.items.forEach(function(it){
        var cat=it.cat||''; if(!cat) return;
        D.line_items[cat]=D.line_items[cat]||[];
        D.line_items[cat].push({name:it.name,proj:it.months,act:actByName[it.name]||Array(12).fill(null),
          scalable:D.pp_scalable_names.indexOf(it.name)>=0});
      });
      document.getElementById('dsP').textContent='Projection: '+file.name;
      document.getElementById('dsP').className='ds ds-u';
      render();
      // Also send to server for persistence across sessions
      var fd2=new FormData(); fd2.append('file', file);
      fetch('/api/upload/projection',{method:'POST',body:fd2}).then(function(r){return r.json();}).then(function(d){
        if(d.pdata) Object.keys(d.pdata).forEach(function(k){ PDATA[k]=d.pdata[k]; });
      }).catch(function(){});
    }catch(err){alert('Error parsing projection: '+err.message);}
    event.target.value='';
  };
  reader.readAsText(file);
}

// ── LOAD PDATA FROM SERVER (overrides static embedded data) ──────────────────
async function loadPdataFromServer(){
  try {
    var r = await fetch('/api/pdata');
    if(!r.ok) return; // no data yet — use embedded fallback
    var serverPdata = await r.json();
    // Merge server data into PDATA
    Object.keys(serverPdata).forEach(function(k){ PDATA[k] = serverPdata[k]; });
    console.log('PDATA loaded from server — act_thru:', PDATA.act_thru);
  } catch(e) {
    console.log('Server pdata unavailable, using embedded data');
  }
}



// Load pdata and state from server, then render
(async function(){
  // Load financial data first
  await loadPdataFromServer();
  try {
    var r = await fetch('/api/state');
    if(r.ok){
      var s = await r.json();
      if(s.scenarioPct && s.scenarioPct.length) STATE.scenarioPct = s.scenarioPct;
      if(s.laborOverrides) STATE.laborOverrides = s.laborOverrides;
      if(s.customItems) STATE.customItems = s.customItems;
      if(s.dismissedAlerts) STATE.dismissedAlerts = s.dismissedAlerts;
      if(s.staffingChanges) STATE.staffingChanges = s.staffingChanges;
    if(s.clickupSent) STATE.clickupSent = s.clickupSent;
    }
  } catch(e) { console.log('Server load failed, using local state'); }
  render();
})();
