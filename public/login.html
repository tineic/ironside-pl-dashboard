<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Ironside — P&L Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Barlow',sans-serif;
  background:#0a0c10;
  color:#e8eaf0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 30% 50%, rgba(220,38,38,0.08) 0%, transparent 60%),
             radial-gradient(ellipse at 70% 30%, rgba(220,38,38,0.04) 0%, transparent 50%);
  pointer-events:none;
}
.card{
  width:100%;max-width:380px;
  padding:48px 40px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  backdrop-filter:blur(20px);
  position:relative;z-index:1;
}
.logo-wrap{
  display:flex;align-items:center;justify-content:center;
  margin-bottom:32px;
  gap:14px;
}
.logo-wrap img{
  width:40px;height:40px;
  filter:invert(1);
  opacity:0.9;
}
.logo-wrap span{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  color:#fff;
}
h1{
  font-size:13px;font-weight:600;
  text-transform:uppercase;letter-spacing:.1em;
  color:rgba(255,255,255,0.4);
  text-align:center;margin-bottom:28px;
}
label{
  display:block;
  font-size:11px;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;
  color:rgba(255,255,255,0.4);
  margin-bottom:8px;
}
input[type=password]{
  width:100%;
  padding:12px 16px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:8px;
  color:#fff;
  font-family:'Barlow',sans-serif;
  font-size:15px;
  outline:none;
  transition:border-color .2s;
  margin-bottom:20px;
}
input[type=password]:focus{border-color:rgba(220,38,38,0.6);}
input[type=password]::placeholder{color:rgba(255,255,255,0.2);}
button{
  width:100%;
  padding:13px;
  background:#dc2626;
  border:none;border-radius:8px;
  color:#fff;
  font-family:'Barlow',sans-serif;
  font-size:14px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  cursor:pointer;
  transition:background .2s,transform .1s;
}
button:hover{background:#b91c1c;}
button:active{transform:scale(0.99);}
.err{
  font-size:12px;color:#f87171;
  text-align:center;margin-top:12px;
  min-height:18px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="/logo.png" alt="Ironside"/>
    <span>Ironside</span>
  </div>
  <h1>P&amp;L Dashboard</h1>
  <label for="pw">Password</label>
  <input type="password" id="pw" placeholder="Enter password" autofocus/>
  <button onclick="login()">Enter</button>
  <p class="err" id="err"></p>
</div>
<script>
document.getElementById('pw').addEventListener('keydown', function(e){
  if(e.key==='Enter') login();
});
async function login(){
  var pw = document.getElementById('pw').value;
  var err = document.getElementById('err');
  err.textContent = '';
  try{
    var r = await fetch('/auth',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({password:pw})
    });
    var d = await r.json();
    if(d.ok){ window.location.href = '/app'; }
    else{ err.textContent = 'Incorrect password.'; }
  }catch(e){ err.textContent = 'Connection error. Try again.'; }
}
</script>
</body>
</html>
